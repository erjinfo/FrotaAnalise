<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frota Analise - Eng. Eric Jonas</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --bg-body: #eef2f7; --bg-card: #ffffff; --text-main: #333333; --text-sub: #666666;
            --border-color: #dddddd; --input-bg: #ffffff; --table-hover: #f1f7ff;
            --modal-bg: rgba(0,0,0,0.5); --site-blue: #1a73e8; --footer-dark-bg: #0b111b;
        }
        body.dark-mode {
            --bg-body: #0d1117; --bg-card: #161b22; --text-main: #e6edf3; --text-sub: #8b949e;
            --border-color: #30363d; --input-bg: #0d1117; --table-hover: #21262d;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-body); color: var(--text-main); padding: 20px; transition: 0.3s; margin: 0; }
        .container { max-width: 1100px; margin: auto; padding-bottom: 50px; }
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .theme-switch { cursor: pointer; padding: 8px 15px; border-radius: 20px; border: 1px solid var(--border-color); background: var(--bg-card); color: var(--text-main); font-weight: bold; }
        .card { background: var(--bg-card); padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); margin-bottom: 30px; border: 1px solid var(--border-color); }
        h2, h3 { color: var(--site-blue); margin-top: 0; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-bottom: 20px; }
        .field { display: flex; flex-direction: column; }
        label { font-size: 11px; font-weight: bold; color: var(--text-sub); margin-bottom: 5px; text-transform: uppercase; }
        input, select, textarea { padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; font-size: 14px; background: var(--input-bg); color: var(--text-main); outline: none; }
        .btn-primary { background: var(--site-blue); color: white; border: none; padding: 14px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; font-size: 16px; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; font-size: 13px; }
        th { text-align: left; padding: 12px; border-bottom: 2px solid var(--border-color); color: var(--text-sub); }
        td { padding: 12px; border-bottom: 1px solid var(--border-color); cursor: pointer; }
        tr:hover { background-color: var(--table-hover); }
        .badge { background: var(--site-blue); color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold; }
        .btn-delete { background: transparent; border: none; color: #eb4d4b; cursor: pointer; font-size: 16px; }

        .dev-footer { margin-top: 50px; display: flex; justify-content: center; }
        .dev-box { background-color: var(--footer-dark-bg); border: 1px solid #1e293b; border-radius: 12px; padding: 15px 25px; display: flex; align-items: center; gap: 15px; width: fit-content; }
        .dev-logo { width: 70px; height: 70px; object-fit: contain; }
        .dev-info { display: flex; flex-direction: column; gap: 4px; }
        .dev-text { color: var(--site-blue); font-size: 16px; font-weight: bold; }
        .dev-email { color: #94a3b8; font-size: 13px; text-decoration: none; }

        .modal { display: none; position: fixed; z-index: 100; left: 0; top: 0; width: 100%; height: 100%; background: var(--modal-bg); }
        .modal-content { background: var(--bg-card); margin: 5% auto; padding: 25px; width: 80%; border-radius: 12px; border: 1px solid var(--border-color); }
        .email-preview { background: var(--input-bg); padding: 20px; border: 1px solid var(--border-color); white-space: pre-wrap; font-family: monospace; font-size: 14px; color: var(--text-main); margin: 15px 0; max-height: 400px; overflow-y: auto; }
        .close-btn { background: #eb4d4b; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; float: right; }
        .copy-btn { background: #27ae60; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h2>🚗 Frota Analise</h2>
        <button class="theme-switch" onclick="toggleTheme()" id="themeBtn">🌙 Modo Escuro</button>
    </div>

    <div class="card">
        <h3>Novo Relatório</h3>
        <div class="grid">
            <div class="field"><label>Técnico</label><input type="text" id="nome"></div>
            <div class="field"><label>Filial</label><input type="text" id="filial" placeholder="Ex: Sumaré"></div>
            <div class="field"><label>Placa Alvo</label><input type="text" id="placa"></div>
            <div class="field"><label>Data</label><input type="text" id="data"></div>
            <div class="field">
                <label>Rastreador</label>
                <select id="rastreador">
                    <option value="Carblock">Carblock (Log de Posições)</option>
                    <option value="Cobli">Cobli (Excel)</option>
                    <option value="Mzone">Mzone (Web - Trip Data)</option>
                </select>
            </div>
            <div class="field"><label>Justificativa</label><input type="text" id="justificativa"></div>
        </div>
        <div class="field">
            <label>Dados Brutos para Análise:</label>
            <textarea id="rawData" rows="5" placeholder="Cole os dados aqui..."></textarea>
        </div>
        <button class="btn-primary" onclick="processarESalvar()">Analisar e Salvar no Banco</button>
    </div>

    <div class="card">
        <h3>📋 Histórico de Análises</h3>
        <table id="tabelaRelatorios">
            <thead>
                <tr>
                    <th>Data</th>
                    <th>Técnico</th>
                    <th>Placa</th>
                    <th>KM Total</th>
                    <th>Justificativa</th>
                    <th>Ação</th>
                </tr>
            </thead>
            <tbody id="corpoTabela"></tbody>
        </table>
    </div>

    <footer class="dev-footer">
        <div class="dev-box">
            <img src="logo.png" alt="Logo" class="dev-logo">
            <div class="dev-info">
                <div class="dev-text">Site desenvolvido por Eng. Eric Jonas</div>
                <a href="mailto:erj.informatica@gmail.com" class="dev-email">✉ erj.informatica@gmail.com</a>
            </div>
        </div>
    </footer>
</div>

<div id="modalEmail" class="modal">
    <div class="modal-content">
        <button class="close-btn" onclick="fecharModal()">Fechar</button>
        <h3>Relatório Formatado</h3>
        <div id="emailConteudo" class="email-preview"></div>
        <button class="copy-btn" onclick="copiarEmail()">Copiar para o E-mail</button>
    </div>
</div>

<script>
    const SB_URL = "https://sdavoozyfnegtzxosabz.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNkYXZvb3p5Zm5lZ3R6eG9zYWJ6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYxODM0NjcsImV4cCI6MjA5MTc1OTQ2N30.Re_TEacuSJSNxCczjdYcv6137nbvF-pe057y5tErgOM";
    const sbClient = supabase.createClient(SB_URL, SB_KEY);
    let historicoLocal = [];

    // HORÁRIO DE CORTE: 08:30 às 18:00
    function estaForaDoHorario(dt) {
        const diaSemana = dt.getDay(); 
        if (diaSemana === 0 || diaSemana === 6) return true;
        const minutos = (dt.getHours() * 60) + dt.getMinutes();
        return (minutos < 510 || minutos > 1080);
    }

    function setarDataAtual() {
        const d = new Date();
        document.getElementById('data').value = `${String(d.getDate()).padStart(2,'0')}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getFullYear()).slice(-2)}`;
    }

    function toggleTheme() {
        const isDark = document.body.classList.toggle('dark-mode');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        document.getElementById('themeBtn').innerText = isDark ? '☀️ Modo Claro' : '🌙 Modo Escuro';
    }

    if (localStorage.getItem('theme') === 'dark') { document.body.classList.add('dark-mode'); document.getElementById('themeBtn').innerText = '☀️ Modo Claro'; }
    window.onload = () => { setarDataAtual(); carregarHistorico(); };

    async function processarESalvar() {
        const raw = document.getElementById('rawData').value.trim();
        const tipo = document.getElementById('rastreador').value;
        const justificativa = document.getElementById('justificativa').value.trim();

        if (!raw || !justificativa) return alert("Preencha os dados e a justificativa!");

        let totalKm = 0, totalMins = 0, detalhes = "";
        let detectPlaca = "", detectNome = "", detectData = "";

        try {
            if (tipo === "Carblock") {
                const linhas = raw.split('\n');
                let viagens = [];
                let viagemAtual = null;

                // Percorre de baixo para cima (cronológico)
                for (let i = linhas.length - 1; i >= 0; i--) {
                    const col = linhas[i].split('\t');
                    if (col.length >= 7 && col[1].includes('-')) {
                        const status = col[0].trim(); // Ligada / Desligada
                        const [dPart, hPart] = col[1].split(' ');
                        const [d, m, a] = dPart.split('-');
                        const dt = new Date(a, m-1, d, hPart.split(':')[0], hPart.split(':')[1]);

                        if (estaForaDoHorario(dt)) {
                            detectData = dPart.replace(/-/g, '/');
                            
                            // Lógica de agrupamento de viagem
                            if (status === "Ligada" && !viagemAtual) {
                                viagemAtual = { inicio: hPart, fim: hPart, de: col[6].trim(), para: col[6].trim(), tIni: dt.getTime() };
                            } else if (viagemAtual) {
                                viagemAtual.fim = hPart;
                                viagemAtual.para = col[6].trim();
                                if (status === "Desligada") {
                                    const duracao = Math.round((dt.getTime() - viagemAtual.tIni) / 60000);
                                    if (duracao > 1) { // Ignora registros de menos de 1 min
                                        viagens.push(viagemAtual);
                                        totalMins += duracao;
                                    }
                                    viagemAtual = null;
                                }
                            }
                        }
                    }
                }
                // Se terminou o loop e ainda estava "ligada"
                if (viagemAtual) {
                    viagens.push(viagemAtual);
                    totalMins += 5; // Estimativa se não houver ponto de desligada
                }

                if (!viagens.length) return alert("Nenhum deslocamento fora do horário encontrado nos dados do Carblock.");
                
                detalhes = viagens.map(v => `Hora: das ${v.inicio} às ${v.fim}\nOrigem: ${v.de}\nDestino: ${v.para}\n`).join('\n---\n');
                totalKm = 0; // Carblock não tem KM no log, usuário deve conferir odômetro se necessário

            } else if (tipo === "Cobli") {
                const linhas = raw.split('\n');
                let trechos = [];
                linhas.forEach(linha => {
                    const col = linha.split('\t');
                    if (col.length >= 8 && col[0].includes('/')) {
                        const [dataP, horaP] = col[6].split(' ');
                        const [d, m, a] = dataP.split('/');
                        const dt = new Date(a, m-1, d, horaP.split(':')[0], horaP.split(':')[1]);
                        if (estaForaDoHorario(dt)) {
                            detectPlaca = col[1]; detectNome = col[2]; detectData = col[0];
                            let km = parseFloat(col[4].replace(',', '.')) || 0;
                            totalKm += km; totalMins += parseInt(col[3]) || 0;
                            trechos.push(`Hora: das ${horaP} às ${col[7].split(' ')[1]} (${km.toString().replace('.',',')} km)`);
                        }
                    }
                });
                detalhes = trechos.reverse().join('\n');
            } else {
                // MZONE TRIP DATA
                const blocos = raw.split(/Trip Data/i).filter(b => b.trim().length > 20);
                let trechos = [];
                blocos.forEach(b => {
                    const dM = b.match(/Distância\s+([\d,.]+)/i);
                    const tM = b.match(/(?:(\d+)h)?\s*?(\d+)m\s+\(([\d:]+) - ([\d:]+)\)/i);
                    if (dM && tM) {
                        const hIni = tM[3];
                        const dtT = new Date(); dtT.setHours(hIni.split(':')[0], hIni.split(':')[1]);
                        if (estaForaDoHorario(dtT)) {
                            let km = parseFloat(dM[1].replace(',', '.'));
                            totalKm += km; totalMins += (parseInt(tM[1]||0)*60)+parseInt(tM[2]);
                            trechos.push(`Hora: das ${tM[3]} às ${tM[4]} (${km.toString().replace('.',',')} km)`);
                            const vM = b.match(/Veículo\s+([^\n-]+)/i);
                            if (vM) { detectNome = vM[1].split(' - ')[0]; detectPlaca = vM[1].split(' - ')[1]; }
                        }
                    }
                });
                detalhes = trechos.join('\n');
            }

            const dadosDB = {
                data_movimentacao: detectData || document.getElementById('data').value,
                tecnico: document.getElementById('nome').value || detectNome,
                placa: document.getElementById('placa').value || detectPlaca,
                filial: document.getElementById('filial').value,
                rastreador: tipo,
                km_total: parseFloat(totalKm.toFixed(1)),
                tempo_total: `${Math.floor(totalMins/60)}h ${totalMins%60} min`,
                origem_inicial: detalhes,
                justificativa: justificativa
            };

            await sbClient.from('relatorios_frota').insert([dadosDB]);
            alert("Salvo com sucesso!"); carregarHistorico();
            document.getElementById('rawData').value = "";
        } catch (e) { alert("Erro ao processar."); console.error(e); }
    }

    async function carregarHistorico() {
        const { data } = await sbClient.from('relatorios_frota').select('*').order('id', { ascending: false });
        if (data) {
            historicoLocal = data;
            const corpo = document.getElementById('corpoTabela');
            corpo.innerHTML = "";
            data.forEach((item, index) => {
                corpo.innerHTML += `<tr onclick="abrirEmail(${index})"><td>${item.data_movimentacao}</td><td>${item.tecnico}</td><td><span class="badge">${item.placa}</span></td><td>${item.km_total} km</td><td>${item.justificativa}</td><td><button class="btn-delete" onclick="deletarRegistro(${item.id}, event)">🗑️</button></td></tr>`;
            });
        }
    }

    async function deletarRegistro(id, e) {
        e.stopPropagation();
        if (confirm("Deletar registro?")) { await sbClient.from('relatorios_frota').delete().eq('id', id); carregarHistorico(); }
    }

    function abrirEmail(index) {
        const d = historicoLocal[index];
        const kmFmt = String(d.km_total).replace('.',',');
        const texto = `Assunto: Relatório de Movimentação fora de padrão ${d.tecnico}, ${d.placa}, ${d.data_movimentacao}, ${d.filial}, ${d.rastreador}\n\nRELATÓRIO DE DESLOCAMENTO VEICULAR\n\nData: ${d.data_movimentacao}\nVeículo: ${d.placa}\nCondutor: ${d.tecnico} (${d.filial})\n\nDeslocamento registrado:\n\n${d.origem_inicial}\n\nTempo total em movimento: ${d.tempo_total}\n${d.km_total > 0 ? 'Distância total: ' + kmFmt + ' km' : ''}\n\nJustificativa: ${d.justificativa}`;
        document.getElementById('emailConteudo').innerText = texto;
        document.getElementById('modalEmail').style.display = 'block';
    }

    function fecharModal() { document.getElementById('modalEmail').style.display = 'none'; }
    function copiarEmail() { navigator.clipboard.writeText(document.getElementById('emailConteudo').innerText); alert("Copiado!"); }
</script>
</body>
</html>
